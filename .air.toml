root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -gcflags='all=-N -l' -o ./tmp/go-webhook ."
  bin = "./tmp/go-webhook serve --config configs/config.yaml"
  delay = 1000
  exclude_dir = ["tmp", "docs", "deploy", "test", ".git", ".vscode"]
  exclude_regex = ["_test\\.go"]
  include_ext = ["go", "yaml"]
  kill_delay = "1s"
  send_interrupt = true
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
